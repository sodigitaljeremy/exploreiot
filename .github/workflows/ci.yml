name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v
      - name: Security audit
        run: pip install pip-audit && pip-audit -r requirements.txt

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high || true

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:md

  marp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run marp:build

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build --strict

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t exploreiot-web .
      - run: docker build -t exploreiot-backend ./backend

    - name: Scan frontend image for CVEs
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: exploreiot-web
        format: table
        severity: CRITICAL,HIGH
        exit-code: 0

    - name: Scan backend image for CVEs
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: exploreiot-backend
        format: table
        severity: CRITICAL,HIGH
        exit-code: 0
