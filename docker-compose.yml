services:
  # ─── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-exploreiot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-exploreiot}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-exploreiot}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@exploreiot.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-127.0.0.1:5051}:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mosquitto:
    build:
      context: ./docker/mosquitto
      args:
        MQTT_USER: ${MQTT_USER:-exploreiot}
        MQTT_PASSWORD: ${MQTT_PASSWORD:-exploreiot_mqtt}
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"
    environment:
      MQTT_USER: ${MQTT_USER:-exploreiot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-exploreiot_mqtt}
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u $$MQTT_USER -P $$MQTT_PASSWORD -t '$$SYS/#' -C 1 -W 3"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ─── Chirpstack v4 (profile: chirpstack) ───────────────────

  redis:
    image: redis:7-alpine
    profiles: ["chirpstack"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chirpstack:
    image: chirpstack/chirpstack:4
    profiles: ["chirpstack"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./docker/chirpstack/chirpstack.toml:/etc/chirpstack/chirpstack.toml
      - ./docker/chirpstack/region_eu868.toml:/etc/chirpstack/region_eu868.toml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    profiles: ["chirpstack"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:1700:1700/udp"
    environment:
      INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE: "eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
      INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE: "eu868/gateway/{{ .GatewayID }}/command/#"
      INTEGRATION__MQTT__AUTH__GENERIC__SERVERS: "tcp://mosquitto:1883"
      INTEGRATION__MQTT__AUTH__GENERIC__USERNAME: ${MQTT_USER:-exploreiot}
      INTEGRATION__MQTT__AUTH__GENERIC__PASSWORD: ${MQTT_PASSWORD:-exploreiot_mqtt}
    depends_on:
      mosquitto:
        condition: service_healthy

  # ─── Backend Python ────────────────────────────────────────

  subscriber:
    build: ./backend
    command: ["python", "subscriber.py"]
    volumes:
      - ./shared:/shared:ro
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-exploreiot}
      DB_USER: ${DB_USER:-exploreiot}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USER: ${MQTT_USER:-exploreiot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-exploreiot_mqtt}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-90}
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; assert time.time()-os.path.getmtime('/tmp/heartbeat')<60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  publisher:
    build: ./backend
    profiles: ["demo"]
    command: ["python", "publisher.py"]
    volumes:
      - ./shared:/shared:ro
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USER: ${MQTT_USER:-exploreiot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-exploreiot_mqtt}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL:-5}
    depends_on:
      mosquitto:
        condition: service_healthy
      subscriber:
        condition: service_started
    restart: unless-stopped

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-127.0.0.1:8002}:8000"
    volumes:
      - ./shared:/shared:ro
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-exploreiot}
      DB_USER: ${DB_USER:-exploreiot}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_KEY: ${API_KEY:-}
      ALERT_TEMP_THRESHOLD: ${ALERT_TEMP_THRESHOLD:-33}
      ALERT_SILENCE_MINUTES: ${ALERT_SILENCE_MINUTES:-10}
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USER: ${MQTT_USER:-exploreiot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-exploreiot_mqtt}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  # ─── Documentation MkDocs ──────────────────────────────────

  docs:
    image: squidfunk/mkdocs-material:9
    ports:
      - "127.0.0.1:8081:8000"
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml
    restart: unless-stopped

  # ─── Frontend Next.js ──────────────────────────────────────

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-127.0.0.1:3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
