site_name: ExploreIOT Dashboard
site_description: Documentation technique du dashboard IoT LoRaWAN temps réel
site_author: Étudiant
repo_url: https://github.com/exploreiot/dashboard
repo_name: exploreiot/dashboard
use_directory_urls: false

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Mode clair
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Mode sombre
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Architecture:
    - Introduction: architecture/01-introduction.md
    - Contraintes: architecture/02-contraintes.md
    - Contexte: architecture/03-contexte.md
    - Stratégie: architecture/04-strategie.md
    - Blocs fonctionnels: architecture/05-blocs.md
    - Vue runtime: architecture/06-runtime.md
    - Déploiement: architecture/07-deploiement.md
    - Concepts transversaux: architecture/08-concepts.md
    - Décisions: architecture/09-decisions.md
    - Risques: architecture/10-risques.md
    - Glossaire: architecture/11-glossaire.md
    - Diagrammes:
      - C4 Contexte: architecture/diagrams/c4-context.md
      - C4 Conteneurs: architecture/diagrams/c4-container.md
      - C4 Composants: architecture/diagrams/c4-component.md
      - MERISE MCD: architecture/diagrams/merise-mcd.md
      - MERISE MLD: architecture/diagrams/merise-mld.md
      - MERISE MPD: architecture/diagrams/merise-mpd.md
      - UML Classes Backend: architecture/diagrams/uml-class-backend.md
      - UML Séquence MQTT: architecture/diagrams/uml-sequence-mqtt.md
      - UML Séquence Dashboard: architecture/diagrams/uml-sequence-dashboard.md
      - UML Activité Alertes: architecture/diagrams/uml-activity-alert.md
